<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Follower Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 40px; width: 90%; max-width: 500px; }
        .login-form, .owner-panel, .user-panel { display: none; }
        .login-form.active, .owner-panel.active, .user-panel.active { display: block; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; font-size: 2.2em; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; }
        input { background: #f0f0f0; transition: all 0.3s; }
        input:focus { outline: none; background: #e8f0fe; box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.3); }
        button { background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .owner-login { background: linear-gradient(45deg, #ff4757, #ff3838) !important; }
        .stock-display { background: #4ecdc4; color: white; font-weight: bold; font-size: 1.2em; padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; }
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4ecdc4, #44a08d); width: 0%; transition: width 0.3s; }
        .plan-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; margin: 5px; }
        .free { background: #ffa726; }
        .premium { background: #4caf50; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .tabs { display: flex; margin: 20px 0; }
        .tab-btn { flex: 1; padding: 15px; background: #f0f0f0; border: none; cursor: pointer; border-radius: 10px 10px 0 0; font-weight: bold; }
        .tab-btn.active { background: white; }
        .tab-content { background: white; padding: 30px; border-radius: 0 10px 10px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .logout { background: #ff4757 !important; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div class="login-form active" id="loginForm">
            <h1>🔐 Secret Hub</h1>
            <input type="password" id="loginPass" placeholder="Enter Password" maxlength="20">
            <button onclick="checkLogin()">Login</button>
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #666;">
                Use owner password for full access
            </p>
        </div>

        <!-- Owner Panel -->
        <div class="owner-panel" id="ownerPanel">
            <h1>👑 Owner Panel</h1>
            <div class="stock-display">Bot Stock: <span id="botStock">0</span></div>
            <div class="stats">
                <div class="stat-card">
                    <div>Free Users</div>
                    <div style="font-size: 1.5em;">0</div>
                </div>
                <div class="stat-card">
                    <div>Premium Users</div>
                    <div style="font-size: 1.5em;">0</div>
                </div>
            </div>
            <button class="logout" onclick="logout()">Logout</button>
        </div>

        <!-- User Panel -->
        <div class="user-panel" id="userPanel">
            <h1>🤖 Follower Bot</h1>
            <div class="stock-display">Available Bots: <span id="userBotStock">0</span></div>
            
            <div class="plan-badge premium" id="planBadge">Premium</div>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('follow')">Follow Bot</button>
                <button class="tab-btn" onclick="switchTab('stock')">Stock</button>
            </div>
            
            <div class="tab-content" id="followTab">
                <input type="text" id="targetUser" placeholder="Target Roblox username">
                <input type="number" id="followAmount" placeholder="Amount to follow (max 10/day free)" min="1" max="999">
                <button id="startBtn" onclick="startFollowing()">🚀 Start Following</button>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="progressText" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
            </div>
            
            <div class="tab-content" id="stockTab" style="display: none;">
                <p><strong>Your Plan:</strong> Premium - Unlimited follows</p>
                <p><strong>Daily Limit:</strong> ∞ (Premium)</p>
                <p><strong>Bot Usage Today:</strong> 0/∞</p>
            </div>
            
            <button class="logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        // Config
        const OWNER_PASS = 'robloxhub2026'; // Change this!
        let isOwner = false;
        let botStock = 0;
        let currentProgress = 0;
        let isRunning = false;
        let dailyUsage = { free: 0, premium: 0 };

        // Roblox API Endpoints (2026 updated)
        const ROBLOX_API = {
            auth: 'https://auth.roblox.com/v2/login',
            users: 'https://users.roblox.com/v1/users',
            friends: 'https://friends.roblox.com/v1/users/{userId}/follow',
            profile: 'https://users.roblox.com/v1/users/{userId}'
        };

        // Fake bot cookies (replace with real ones)
        const botCookies = [];

        function checkLogin() {
            const pass = document.getElementById('loginPass').value;
            if (pass === OWNER_PASS) {
                isOwner = true;
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('ownerPanel').classList.add('active');
                updateOwnerPanel();
            } else {
                // Regular user login (always accepts for demo)
                isOwner = false;
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('userPanel').classList.add('active');
                updateUserPanel();
            }
        }

        function logout() {
            isOwner = false;
            document.getElementById('ownerPanel').classList.remove('active');
            document.getElementById('userPanel').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('loginPass').value = '';
            stopFollowing();
        }

        function updateOwnerPanel() {
            document.getElementById('botStock').textContent = botStock;
        }

        function updateUserPanel() {
            document.getElementById('userBotStock').textContent = Math.floor(botStock * 0.8);
            document.getElementById('planBadge').className = 'plan-badge premium';
            document.getElementById('planBadge').textContent = 'Premium';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.style.display = 'none');
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').style.display = 'block';
        }

        async function startFollowing() {
            if (isRunning) return;
            
            const targetUser = document.getElementById('targetUser').value.trim();
            const amount = parseInt(document.getElementById('followAmount').value) || 1;
            
            if (!targetUser) {
                alert('Enter target username!');
                return;
            }

            if (amount > 10 && !isOwner) {
                alert('Free plan: max 10/day!');
                return;
            }

            if (botStock < amount) {
                alert('Not enough bots in stock!');
                return;
            }

            isRunning = true;
            const startBtn = document.getElementById('startBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            startBtn.disabled = true;
            startBtn.textContent = 'Running...';
            progressBar.style.display = 'block';
            
            // Get target user ID
            const userId = await getUserId(targetUser);
            if (!userId) {
                alert('User not found!');
                stopFollowing();
                return;
            }

            botStock -= amount;
            updatePanels();

            // Simulate following with real API calls
            for (let i = 0; i < amount; i++) {
                currentProgress = ((i + 1) / amount) * 100;
                progressFill.style.width = currentProgress + '%';
                progressText.textContent = `Following... ${i + 1}/${amount} (${Math.round(currentProgress)}%)`;
                
                await followUser(userId, i);
                await new Promise(resolve => setTimeout(resolve, 500 + Math.random() * 1000)); // Rate limit
            }

            progressText.textContent = '✅ Done following!';
            setTimeout(() => {
                stopFollowing();
                progressBar.style.display = 'none';
            }, 2000);
        }

        async function getUserId(username) {
            try {
                const response = await fetch(`https://users.roblox.com/v1/usernames/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'User-Agent': 'Roblox/WinInet' },
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: false })
                });
                const data = await response.json();
                return data.data[0]?.id;
            } catch (e) {
                console.error('User lookup failed:', e);
                return null;
            }
        }

        async function followUser(userId, botIndex) {
            try {
                // Use bot cookie for auth
                const cookie = botCookies[botIndex % botCookies.length] || generateBotCookie();
                
                await fetch(`https://friends.roblox.com/v1/users/${userId}/follow`, {
                    method: 'POST',
                    headers: {
                        'Cookie': `.ROBLOSECURITY=${cookie}`,
                        'Content-Type': 'application/json',
                        'User-Agent': 'Roblox/WinInet',
                        'X-CSRF-TOKEN': await getCsrfToken()
                    }
                });
            } catch (e) {
                console.error('Follow failed:', e);
            }
        }

        async function getCsrfToken() {
            const response = await fetch('https://www.roblox.com/home', {
                credentials: 'include'
            });
            const token = response.headers.get('x-csrf-token');
            return token || '';
        }

        function generateBotCookie() {
            // Generate fake .ROBLOSECURITY cookie (replace with real alt account cookies)
            return 'abcdefghijklmnopqrstuvwxyz1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        }

        function stopFollowing() {
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '🚀 Start Following';
            currentProgress = 0;
        }

        function updatePanels() {
            if (isOwner) updateOwnerPanel();
            else updateUserPanel();
        }

        // Simulate bot stock management
        setInterval(() => {
            if (Math.random() > 0.7) {
                botStock = Math.min(botStock + 1, 100);
                updatePanels();
            }
        }, 30000);

        // Enter to login
        document.getElementById('loginPass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkLogin();
        });
    </script>
</body>
</html>
